# Unit tests + type check on every PR. macOS runner — the suite imports
# AppKit/PyObjC. The bundle smoke test (make smoke-bundle) stays a local
# pre-release step: it needs a GUI session and a py2app build.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest (fast suite)
        run: python -m pytest tests/ -q -m "not slow and not integration"

      - name: mypy
        run: python -m mypy src/
