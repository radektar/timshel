[tool.black]
line-length = 88
target-version = ['py38', 'py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
# Runtime is 3.12 (see project CLAUDE.md). The gate previously pinned "3.8",
# which the installed mypy rejects outright ("must be 3.10 or higher") — so
# the type-check step silently checked NOTHING. Pinning the real runtime makes
# the gate actually run.
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
ignore_missing_imports = true

# --- Type-debt baseline -----------------------------------------------------
# When the gate was turned on it surfaced ~140 pre-existing errors in these 25
# modules: mostly PyObjC-bridge noise (mypy can't type AppKit without stubs)
# and Anthropic-SDK union false positives, plus legacy `Returning Any` /
# `= None` sloppiness. Grandfathered so the gate is green and enforces every
# OTHER (and every NEW) module. TODO: burn this list down module-by-module
# (start with the non-PyObjC ones: config.config, transcriber, vocabulary).
[[tool.mypy.overrides]]
module = [
    "src.config.config",
    "src.config.license",
    "src.connections.note_graph",
    "src.connections.recall.embedding",
    "src.connections.recall.indexing",
    "src.connections.recall.vector_store",
    "src.env_loader",
    "src.file_monitor",
    "src.logger",
    "src.markdown_generator",
    "src.menu_app",
    "src.setup.wizard",
    "src.summarizer",
    "src.tagger",
    "src.transcriber",
    "src.ui.dashboard_window",
    "src.ui.dialogs",
    "src.ui.download_window",
    "src.ui.folder_picker",
    "src.ui.log_viewer",
    "src.ui.settings_window",
    "src.ui.style",
    "src.ui.theme",
    "src.volume_identity",
    "src.vocabulary",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "pro: marks tests for the PRO/MCP product (skipped until malinche_pro exists)",
    "e2e: scenario tests that run real whisper and/or real Claude (L2/L3)",
    "ui: menu bar UI tests (L4)",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/venv/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long (relax — long strings + URLs)
    "B008",  # default mutable arg (rare in this codebase)
]
exclude = [
    "venv",
    "build",
    "dist",
    ".pytest_cache",
    "Docs",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402", "F811"]  # late imports + fixture redefinitions ok in tests






